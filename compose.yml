services:
  web:
    build:
      context: .
      dockerfile_inline: |
        FROM php:8.2-apache
        RUN docker-php-ext-install pdo pdo_mysql
        RUN a2enmod rewrite
        WORKDIR /var/www/html
    container_name: school_lab_web
    restart: unless-stopped
    expose:
      - "80"
    volumes:
      - ./src:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      DB_NAME: school_lab
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_CHARSET: utf8mb4
    depends_on:
      db:
        condition: service_healthy

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: school_lab_tunnel
    restart: unless-stopped
    command: tunnel --no-autoupdate --url http://web:80 run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      web:
        condition: service_started

  db:
    image: mysql:8.0
    container_name: school_lab_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: school_lab
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./.docker/mysql-data:/var/lib/mysql
      - ./src/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
